<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: #f5f6fa;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: #2f3640;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            margin: 5px 0;
            border-radius: 8px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background-color: #40739e;
        }

        /* Main content */
        .main-content {
            flex: 1;
            padding: 20px;
        }

        /* Navbar */
        .navbar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }

        .navbar h1 {
            font-size: 28px;
            color: #2f3640;
        }

        .navbar button {
            padding: 8px 15px;
            background-color: #e84118;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .navbar button:hover {
            background-color: #c23616;
        }

        /* Cards */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .card h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #2f3640;
        }

        .card p {
            font-size: 24px;
            font-weight: 500;
            color: #40739e;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
            }
            .sidebar h2 {
                display: none;
            }
            .sidebar a {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="#">Home</a>
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="{% url 'user_post_list' %}">Post</a>
        <a href="{% url 'post_create' %}">Add Post</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Navbar -->
        <div class="navbar">
            <h1>Welcome, {{ user.username }}</h1>
            <button onclick=>Logout</button>
        </div>

        <!-- Stats Cards -->
        <div class="cards">
            <div class="card">
                <h3>Last Read</h3>
                <p>12 pages</p>
            </div>
            <div class="card">
                <h3>Saved Books</h3>
                <p>5</p>
            </div>
            <div class="card">
                <h3>New Messages</h3>
                <p>23</p>
            </div>
            <div class="card">
                <h3>Reports</h3>
                <p>5</p>
            </div>
        </div>

        <!-- Additional Content -->
        <div style="margin-top: 30px;">
            <h2>Recent Activity</h2>
            <p>No recent activity yet.</p>
        </div>
    </div>

</body>
</html>
