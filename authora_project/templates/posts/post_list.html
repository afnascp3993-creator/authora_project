{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="fw-semibold">Posts</h2>

<a href="{% url 'post_create' %}" class="btn btn-dark add-btn">
Add Post
</a>

</div>


<div class="row g-4">

{% for post in posts %}

<div class="col-md-4">

<div class="post-card">

<!-- CLICKABLE IMAGE -->
<a href="{% url 'post_detail' post.id %}">
<img src="{{ post.image.url }}" class="post-image">
</a>

<div class="post-body">

<!-- CLICKABLE TITLE -->
<h5 class="post-title">

<a href="{% url 'post_detail' post.id %}">
{{ post.title }}
</a>

</h5>

<p class="post-category">
Category: {{ post.category.title }}
</p>

</div>

<div class="post-footer">

<a href="{% url 'post_update' post.id %}" class="btn btn-sm btn-outline-dark">
Edit
</a>

<a href="{% url 'post_delete' post.id %}" class="btn btn-sm btn-outline-danger">
Delete
</a>

</div>

</div>

</div>

{% empty %}

<p>No posts available</p>

{% endfor %}

</div>

{% endblock %}
