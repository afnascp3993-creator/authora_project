<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #f7f7f5;
            --grey-100: #ebebeb;
            --grey-200: #d4d4d4;
            --grey-400: #9a9a9a;
            --grey-600: #5a5a5a;
            --grey-800: #2a2a2a;
            --radius: 4px;
            --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-color: var(--white);
            font-family: 'Syne', sans-serif;
            color: var(--black);
            padding: 40px 20px;
        }

        /* ─── BACKGROUND GRID ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── WRAPPER ─── */
        .page-wrapper {
            max-width: 760px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── PAGE HEADER ─── */
        .page-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--grey-100);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
        }

        .page-header-left .page-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--grey-400);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .page-header h2 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--black);
        }

        .page-header .back-link {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--grey-400);
            text-decoration: none;
            text-transform: uppercase;
            transition: var(--transition);
            border-bottom: 1px solid transparent;
        }

        .page-header .back-link:hover {
            color: var(--black);
            border-color: var(--black);
        }

        /* ─── FORM CARD ─── */
        .form-card {
            background: var(--black);
            border-radius: var(--radius);
            padding: 40px;
            position: relative;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--white);
            border-radius: var(--radius) var(--radius) 0 0;
        }

        /* ─── FIELD GROUPS ─── */
        .field-group {
            margin-bottom: 24px;
            animation: fadeIn 0.4s both;
        }

        .field-group:nth-child(1) { animation-delay: 0.1s; }
        .field-group:nth-child(2) { animation-delay: 0.15s; }
        .field-group:nth-child(3) { animation-delay: 0.2s; }
        .field-group:nth-child(4) { animation-delay: 0.25s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .field-group label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--grey-400);
            margin-bottom: 9px;
            font-weight: 500;
        }

        .field-group input[type="text"],
        .field-group select {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--grey-800);
            border-radius: var(--radius);
            font-size: 16px;
            font-family: 'Syne', sans-serif;
            font-weight: 500;
            background: #1a1a1a;
            color: var(--white);
            transition: var(--transition);
            outline: none;
            appearance: none;
        }

        .field-group input[type="text"]::placeholder {
            color: var(--grey-600);
            font-weight: 400;
            font-size: 15px;
        }

        .field-group input[type="text"]:focus,
        .field-group select:focus {
            border-color: var(--white);
            background: #222;
            box-shadow: 0 0 0 3px rgba(247,247,245,0.06);
        }

        /* Select wrapper for custom arrow */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '↓';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--grey-400);
            font-size: 12px;
            pointer-events: none;
            font-family: 'DM Mono', monospace;
        }

        .field-group select option {
            background: #1a1a1a;
            color: var(--white);
        }

        /* ─── FILE UPLOAD ─── */
        .file-upload-wrapper {
            position: relative;
        }

        .file-upload-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border: 1.5px dashed var(--grey-800);
            border-radius: var(--radius);
            background: #1a1a1a;
            cursor: pointer;
            transition: var(--transition);
        }

        .file-upload-label:hover {
            border-color: var(--grey-600);
            background: #222;
        }

        .file-upload-label .upload-icon {
            font-size: 18px;
            opacity: 0.5;
        }

        .file-upload-label .upload-text {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: var(--grey-400);
            letter-spacing: 0.04em;
        }

        .file-upload-label .upload-text span {
            color: var(--white);
            border-bottom: 1px solid var(--grey-600);
        }

        .file-name-display {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            color: var(--grey-400);
            margin-top: 6px;
            letter-spacing: 0.04em;
            min-height: 18px;
        }

        input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        /* ─── RICH TEXT EDITOR ─── */
        .editor-wrapper {
            border: 1.5px solid var(--grey-800);
            border-radius: var(--radius);
            background: #1a1a1a;
            overflow: hidden;
            transition: var(--transition);
        }

        .editor-wrapper:focus-within {
            border-color: var(--white);
            box-shadow: 0 0 0 3px rgba(247,247,245,0.06);
        }

        /* Toolbar */
        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 8px 10px;
            background: var(--grey-800);
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            width: 32px;
            height: 30px;
            border: none;
            background: transparent;
            color: var(--grey-400);
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .toolbar-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        .toolbar-btn.active {
            background: var(--white);
            color: var(--black);
        }

        .toolbar-sep {
            width: 1px;
            height: 20px;
            background: #444;
            margin: 0 4px;
            flex-shrink: 0;
        }

        .toolbar-select {
            background: transparent;
            border: 1px solid #444;
            border-radius: 3px;
            color: var(--grey-400);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 500;
            padding: 2px 8px;
            cursor: pointer;
            outline: none;
            height: 30px;
        }

        .toolbar-select option {
            background: var(--grey-800);
            color: var(--white);
        }

        /* Editor content area */
        .editor-content {
            min-height: 220px;
            max-height: 400px;
            overflow-y: auto;
            padding: 18px;
            color: var(--white);
            font-size: 16px;
            font-weight: 500;
            line-height: 1.8;
            font-family: 'Syne', sans-serif;
            outline: none;
            caret-color: var(--white);
        }

        .editor-content:empty::before {
            content: attr(data-placeholder);
            color: var(--grey-600);
            pointer-events: none;
        }

        .editor-content h1, .editor-content h2, .editor-content h3 {
            color: var(--white);
            letter-spacing: -0.02em;
            margin: 12px 0 6px;
        }

        .editor-content p { margin-bottom: 8px; }

        .editor-content strong { color: var(--white); }

        .editor-content em { color: var(--grey-200); }

        .editor-content u { text-underline-offset: 3px; }

        .editor-content ul, .editor-content ol {
            padding-left: 20px;
            margin-bottom: 8px;
        }

        .editor-content blockquote {
            border-left: 3px solid var(--grey-600);
            padding-left: 14px;
            color: var(--grey-400);
            font-style: italic;
            margin: 10px 0;
        }

        .editor-content a {
            color: var(--grey-200);
            text-underline-offset: 3px;
        }

        .editor-content::-webkit-scrollbar { width: 4px; }
        .editor-content::-webkit-scrollbar-track { background: transparent; }
        .editor-content::-webkit-scrollbar-thumb { background: var(--grey-800); border-radius: 2px; }

        /* char count */
        .editor-footer {
            padding: 6px 14px;
            border-top: 1px solid #333;
            display: flex;
            justify-content: flex-end;
        }

        .char-count {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            color: var(--grey-600);
            letter-spacing: 0.08em;
        }

        /* Hidden textarea that receives the HTML */
        #content-hidden {
            display: none;
        }

        /* ─── ROW LAYOUT ─── */
        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        

        /* ─── FORM ACTIONS ─── */
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--grey-800);
            animation: fadeIn 0.4s 0.35s both;
        }

        .btn-save {
            flex: 1;
            padding: 14px;
            background: var(--white);
            border: 1.5px solid var(--white);
            border-radius: var(--radius);
            color: var(--black);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color var(--transition);
        }

        .btn-save::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--black);
            border: 1.5px solid var(--white);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            z-index: 0;
        }

        .btn-save:hover::after { transform: scaleX(1); transform-origin: left; }
        .btn-save:hover { color: var(--white); }

        .btn-save span { position: relative; z-index: 1; }

        .btn-discard {
            padding: 14px 22px;
            background: transparent;
            border: 1.5px solid var(--grey-800);
            border-radius: var(--radius);
            color: var(--grey-400);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-discard:hover {
            border-color: var(--grey-600);
            color: var(--grey-200);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 600px) {
            .form-card { padding: 24px 20px; }
            .field-row { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <!-- Page Header -->
    <div class="page-header">
        <div class="page-header-left">
            <div class="page-label">Content Management</div>
            <h2>Create Post</h2>
        </div>
        <a href="{% url 'user_post_list'%}" class="back-link">← Back to Posts</a>

    </div>

    <!-- Form Card -->
    <div class="form-card">
        <form method="POST" enctype="multipart/form-data" id="post-form">
            {% csrf_token %}

            <!-- Title -->
            <div class="field-group">
                <label for="title">Post Title</label>
                <input type="text" id="title" name="title" placeholder="Enter the title">
            </div>

            <!-- Content Editor -->
            <div class="field-group">
                <label>Content</label>
                <div class="editor-wrapper">
                    <!-- Toolbar -->
                    <div class="editor-toolbar">
                        <select class="toolbar-select" onchange="execFormat('formatBlock', this.value); this.selectedIndex=0;">
                            <option value="" disabled selected>Paragraph</option>
                            <option value="h1">Heading 1</option>
                            <option value="h2">Heading 2</option>
                            <option value="h3">Heading 3</option>
                            <option value="p">Normal</option>
                        </select>
                        <div class="toolbar-sep"></div>
                        <button type="button" class="toolbar-btn" onclick="execFormat('bold')" title="Bold"><b>B</b></button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('italic')" title="Italic"><i>I</i></button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('underline')" title="Underline"><u>U</u></button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('strikeThrough')" title="Strikethrough"><s>S</s></button>
                        <div class="toolbar-sep"></div>
                        <button type="button" class="toolbar-btn" onclick="execFormat('justifyLeft')" title="Align Left">&#8676;</button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('justifyCenter')" title="Center">&#8677;</button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('justifyRight')" title="Align Right">&#8677;</button>
                        <div class="toolbar-sep"></div>
                        <button type="button" class="toolbar-btn" onclick="execFormat('insertUnorderedList')" title="Bullet List">≡</button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('insertOrderedList')" title="Numbered List">№</button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('formatBlock','blockquote')" title="Blockquote">"</button>
                        <div class="toolbar-sep"></div>
                        <button type="button" class="toolbar-btn" onclick="insertLink()" title="Link">⎘</button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('removeFormat')" title="Clear Format">✕</button>
                        <div class="toolbar-sep"></div>
                        <button type="button" class="toolbar-btn" onclick="execFormat('undo')" title="Undo">↩</button>
                        <button type="button" class="toolbar-btn" onclick="execFormat('redo')" title="Redo">↪</button>
                    </div>

                    <!-- Editable Area -->
                    <div
                        class="editor-content"
                        id="editor"
                        contenteditable="true"
                        data-placeholder="Start writing your post…"
                    ></div>

                    <!-- Footer -->
                    <div class="editor-footer">
                        <span class="char-count" id="char-count">0 characters</span>
                    </div>
                </div>
                <!-- Hidden input that submits content -->
                <textarea id="content-hidden" name="content"></textarea>
            </div>

            <!-- Image + Category Row -->
            <div class="field-row">
                <!-- Image Upload -->
                <div class="field-group">
                    <label>Cover Image</label>
                    <div class="file-upload-wrapper">
                        <label class="file-upload-label" for="image-input">
                            <span class="upload-icon">◈</span>
                            <span class="upload-text"><span>Choose file</span> or drag here</span>
                        </label>
                        <input type="file" id="image-input" name="image" accept="image/*">
                        <div class="file-name-display" id="file-name">No file selected</div>
                    </div>
                </div>

                <!-- Category -->
            <div class="field-group"> 
            <label for="category">Category</label> 
            <div class="select-wrapper"> 
            <select name="category" class="form-control">
             {% for choice in form.category.field.queryset %}
             <option value="{{ choice.id }}">{{ choice.title }}</option>
             {% endfor %}
            </select>
            <br><br>
         </div>
     </div>   
 </div>




             

            <!-- Actions -->
            <div class="form-actions">
                <button type="submit" class="btn-save"><span>Publish Post →</span></button>
            </div>

        </form>
    </div>

</div>

<script>
    // ─── RICH TEXT EXEC ───
    function execFormat(cmd, value = null) {
        document.getElementById('editor').focus();
        document.execCommand(cmd, false, value);
        updateToolbarState();
    }

    function insertLink() {
        const url = prompt('Enter URL:');
        if (url) execFormat('createLink', url);
    }

    // ─── TOOLBAR ACTIVE STATE ───
    function updateToolbarState() {
        const cmds = ['bold','italic','underline','strikeThrough'];
        document.querySelectorAll('.toolbar-btn').forEach(btn => {
            const cmd = btn.getAttribute('onclick');
            cmds.forEach(c => {
                if (cmd && cmd.includes(`'${c}'`)) {
                    btn.classList.toggle('active', document.queryCommandState(c));
                }
            });
        });
    }

    document.getElementById('editor').addEventListener('keyup', updateToolbarState);
    document.getElementById('editor').addEventListener('mouseup', updateToolbarState);

    // ─── CHAR COUNT ───
    document.getElementById('editor').addEventListener('input', function () {
        const text = this.innerText || '';
        const count = text.replace(/\n/g, '').length;
        document.getElementById('char-count').textContent = count + ' character' + (count !== 1 ? 's' : '');
    });

    // ─── SYNC EDITOR → HIDDEN TEXTAREA ON SUBMIT ───
    document.getElementById('post-form').addEventListener('submit', function () {
        document.getElementById('content-hidden').value = document.getElementById('editor').innerHTML;
    });

    // ─── FILE NAME DISPLAY ───
    document.getElementById('image-input').addEventListener('change', function () {
        const name = this.files[0] ? this.files[0].name : 'No file selected';
        document.getElementById('file-name').textContent = '◎ ' + name;
    });

    // ─── DRAG & DROP on file label ───
    const fileLabel = document.querySelector('.file-upload-label');
    fileLabel.addEventListener('dragover', e => { e.preventDefault(); fileLabel.style.borderColor = 'var(--grey-400)'; });
    fileLabel.addEventListener('dragleave', () => { fileLabel.style.borderColor = ''; });
    fileLabel.addEventListener('drop', e => {
        e.preventDefault();
        fileLabel.style.borderColor = '';
        const file = e.dataTransfer.files[0];
        if (file) {
            document.getElementById('image-input').files = e.dataTransfer.files;
            document.getElementById('file-name').textContent = '◎ ' + file.name;
        }
    });
</script>

</body>
</html>
