<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Authora</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f5f5f5;
color:#111;
min-height:100vh;
}

/* Navbar */

.navbar{
background:#000;
}

.navbar-brand{
font-weight:600;
letter-spacing:1px;
color:white !important;
}

.nav-link{
color:#d1d5db !important;
margin-right:10px;
}

.nav-link:hover{
color:white !important;
}

/* Content Wrapper */

.content-wrapper{
background:white;
padding:40px;
border-radius:12px;
border:1px solid #eee;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

/* Blog Cards */

.blog-card{
background:white;
border-radius:12px;
padding:25px;
border:1px solid #eee;
height:100%;
transition:0.3s;
}

.blog-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.blog-title{
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

.blog-title a{
text-decoration:none;
color:black;
}

.blog-title a:hover{
color:#555;
}

.blog-text{
color:#6b7280;
font-size:14px;
margin-bottom:20px;
}

.blog-footer{
display:flex;
justify-content:space-between;
align-items:center;
font-size:13px;
}

.blog-date{
color:#9ca3af;
}

.read-more{
text-decoration:none;
color:black;
font-weight:500;
}

.read-more:hover{
text-decoration:underline;
}

/* Footer */

footer{
margin-top:50px;
padding:20px;
text-align:center;
color:#6b7280;
}

/* Toast */

.toast{
border-radius:8px;
}
/* Toast container */

.toast-container{
z-index:9999;
}

/* Modern toast */

.custom-toast{
background:#000;
color:white;
border-radius:10px;
padding:8px 12px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
margin-bottom:10px;
animation:slideIn 0.4s ease;
}

/* Toast animation */

@keyframes slideIn{

from{
opacity:0;
transform:translateX(50px);
}

to{
opacity:1;
transform:translateX(0);
}

}

/* Main content card */

.content-wrapper{
background:white;
padding:40px;
border-radius:12px;
border:1px solid #eee;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}
/* Add Post button */

.add-btn{
border-radius:8px;
padding:8px 16px;
transition:0.3s;
}

.add-btn:hover{
transform:translateY(-2px);
}

/* Post card */

.post-card{
background:white;
border:1px solid #eee;
border-radius:12px;
overflow:hidden;
height:100%;
transition:0.3s;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.post-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

/* Post image */

.post-image{
width:100%;
height:200px;
object-fit:cover;
}

/* Card body */

.post-body{
padding:18px;
}

.post-title a{
text-decoration:none;
color:black;
font-weight:600;
}

.post-title a:hover{
color:#555;
}

/* Category */

.post-category{
font-size:14px;
color:#6b7280;
margin-top:6px;
}

/* Footer */

.post-footer{
padding:15px 18px;
border-top:1px solid #eee;
display:flex;
gap:10px;
}

/* Form container */

.form-wrapper{
max-width:600px;
margin:auto;
background:white;
padding:40px;
border-radius:12px;
border:1px solid #eee;
box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

/* Title */

.form-title{
font-weight:600;
margin-bottom:25px;
}

/* Form fields */

.post-form input,
.post-form textarea,
.post-form select{
width:100%;
padding:10px 12px;
border-radius:6px;
border:1px solid #ddd;
margin-top:5px;
margin-bottom:15px;
font-size:14px;
}

.post-form input:focus,
.post-form textarea:focus,
.post-form select:focus{
outline:none;
border-color:black;
box-shadow:0 0 0 2px rgba(0,0,0,0.05);
}

/* Buttons */

.form-buttons{
margin-top:10px;
display:flex;
gap:10px;
}

.btn-dark{
border-radius:6px;
padding:8px 16px;
}

.btn-outline-secondary{
border-radius:6px;
padding:8px 16px;
}
/* Category page wrapper */

.category-wrapper{
background:white;
padding:35px;
border-radius:12px;
border:1px solid #eee;
box-shadow:0 8px 25px rgba(0,0,0,0.05);
}

/* Table card */

.table-card{
border-radius:10px;
overflow:hidden;
}

/* Table style */

.category-table{
margin-bottom:0;
}

.category-table thead{
background:#f9fafb;
}

.category-table th{
font-weight:600;
padding:14px;
}

.category-table td{
padding:14px;
vertical-align:middle;
}

/* Table hover */

.category-table tbody tr:hover{
background:#fafafa;
}

/* Buttons */

.btn-dark{
border-radius:6px;
padding:7px 14px;
}

.btn-outline-dark{
border-radius:6px;
}

.btn-outline-danger{
border-radius:6px;
}

</style>

</head>


<body>


<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand">Authora</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
{% comment %} <a class="nav-link" href="{% url '' %}">Home</a> {% endcomment %}
</li>
<li class="nav-item">
<a class="nav-link" href="{% url 'logout' %}">Logout</a>
</li>
</ul>

</div>

</div>

</nav>

<!-- Toast Messages -->

{% if messages %}

<div class="toast-container position-fixed top-0 end-0 p-4">

{% for message in messages %}

<div class="toast custom-toast align-items-center border-0 show">

<div class="d-flex">

<div class="toast-body">

{{ message }}

</div>

<button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>

</div>

</div>

{% endfor %}

</div>

{% endif %}



<!-- Main Content -->

<div class="container mt-5">

<div class="content-wrapper">

{% block content %}

{% endblock %}

</div>

</div>


<footer>

<p>© 2026 Authora — Modern Django CMS</p>

</footer>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

document.addEventListener("DOMContentLoaded", function(){

let toastElList = [].slice.call(document.querySelectorAll('.toast'))

toastElList.map(function(toastEl){

let toast = new bootstrap.Toast(toastEl,{delay:3000})

toast.show()

})

})

</script>

</body>

</html>
