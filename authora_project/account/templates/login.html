<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #f7f7f5;
            --grey-100: #ebebeb;
            --grey-200: #d4d4d4;
            --grey-400: #9a9a9a;
            --grey-600: #5a5a5a;
            --grey-800: #2a2a2a;
            --radius: 4px;
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Syne', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ─── BACKGROUND GRID ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ─── FLOATING ORBS ─── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 360px; height: 360px;
            background: rgba(0,0,0,0.05);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 280px; height: 280px;
            background: rgba(0,0,0,0.04);
            bottom: -80px; right: -80px;
            animation-delay: -6s;
        }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        /* ─── CARD ─── */
        .container {
            background: var(--black);
            width: 100%;
            max-width: 400px;
            padding: 48px 40px 40px;
            border-radius: var(--radius);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* top accent bar */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--white);
            border-radius: var(--radius) var(--radius) 0 0;
        }

        /* ─── HEADER ─── */
        .card-label {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--grey-400);
            margin-bottom: 10px;
            animation: fadeIn 0.5s 0.2s both;
        }

        .container h2 {
            font-size: 30px;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.03em;
            margin-bottom: 32px;
            animation: fadeIn 0.5s 0.25s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── MESSAGES ─── */
        .message {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.05em;
            padding: 10px 14px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            border: 1px solid var(--grey-800);
            color: var(--grey-400);
            background: var(--grey-800);
            animation: fadeIn 0.4s both;
        }

        .message.error {
            background: rgba(139,0,0,0.2);
            border-color: rgba(139,0,0,0.5);
            color: #ff8a8a;
        }

        /* ─── INPUTS ─── */
        .input-group {
            margin-bottom: 16px;
            position: relative;
            animation: fadeIn 0.5s both;
        }

        .input-group:nth-child(1) { animation-delay: 0.3s; }
        .input-group:nth-child(2) { animation-delay: 0.35s; }

        .input-group label {
            display: block;
            font-size: 9px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--grey-400);
            margin-bottom: 7px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--grey-800);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            background: #1a1a1a;
            color: var(--white);
            transition: var(--transition);
            outline: none;
        }

        .input-group input::placeholder {
            color: var(--grey-600);
            font-weight: 400;
        }

        .input-group input:focus {
            border-color: var(--white);
            background: #222;
            box-shadow: 0 0 0 3px rgba(247,247,245,0.07);
        }

        .input-line {
            position: absolute;
            bottom: 0; left: 0;
            height: 2px;
            width: 0;
            background: var(--white);
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
            border-radius: 2px;
        }

        .input-group input:focus ~ .input-line {
            width: 100%;
        }

        /* ─── BUTTON ─── */
        .btn {
            width: 100%;
            padding: 13px;
            background: var(--white);
            border: 1.5px solid var(--white);
            border-radius: var(--radius);
            color: var(--black);
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color var(--transition);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s 0.45s both;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--black);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            z-index: 0;
            border: 1.5px solid var(--white);
        }

        .btn:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .btn:hover { color: var(--white); }

        .btn span {
            position: relative;
            z-index: 1;
        }

        /* ─── DIVIDER ─── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 20px;
            animation: fadeIn 0.5s 0.5s both;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--grey-800);
        }

        .divider span {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.15em;
            color: var(--grey-600);
        }

        /* ─── REGISTER LINK ─── */
        .register-link {
            text-align: center;
            font-size: 12px;
            color: var(--grey-400);
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.05em;
            animation: fadeIn 0.5s 0.55s both;
        }

        .register-link a {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1.5px solid var(--white);
            padding-bottom: 1px;
            transition: var(--transition);
        }

        .register-link a:hover { opacity: 0.5; }

        /* ─── CORNER MARK ─── */
        .corner-mark {
            position: absolute;
            bottom: 16px;
            right: 20px;
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--grey-600);
            letter-spacing: 0.1em;
        }

        @media (max-width: 480px) {
            .container { padding: 36px 24px 32px; margin: 16px; }
            .container h2 { font-size: 24px; }
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="card-label">Secure Login</div>
        <h2>Welcome Back</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% if error %}
            <div class="message error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login/">
            {% csrf_token %}

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
                <div class="input-line"></div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
                <div class="input-line"></div>
            </div>

            <button type="submit" class="btn"><span>Login →</span></button>
        </form>

        <div class="divider"><span>or</span></div>

        <div class="register-link">
            New here? <a href="{% url 'register' %}">Create Account</a>
        </div>

        <div class="corner-mark">v2.4.1</div>
    </div>

</body>
</html>
